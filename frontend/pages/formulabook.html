<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula Book | JEEVerse</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/typography.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/utilities.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header id="navbar"></header>

<main>

    <section class="page-header">
        <div class="container">
            <h1>Formula Book</h1>

            <p>
                Quickly revise all important JEE formulas chapter by chapter.
            </p>
        </div>
    </section>

    <section class="formula-tabs">
        <div class="container">
            <button class="btn btn-primary subject-tab active" data-subject="physics">
                Physics
            </button>

            <button class="btn btn-secondary subject-tab" data-subject="chemistry">
                Chemistry                
            </button>

            <button class="btn btn-secondary subject-tab" data-subject="mathematics">
                Mathematics
            </button>
        </div>
    </section>

    <section class="formula-list">

        <div class="container">

            <div id="formulaContainer"></div>

        </div>

    </section>

</main>

<footer id="footer"></footer>

<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../js/app.js"></script>
<script src="../js/modules/formulabook.js"></script>

</body>
</html>
